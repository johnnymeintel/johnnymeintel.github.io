// ── State ──────────────────────────────────────────────────────────────────
let checked = {};
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) checked = JSON.parse(saved);
} catch {}

const expanded = { recon: true };

// ── Helpers ────────────────────────────────────────────────────────────────
const totalItems = sections.reduce((a, s) => a + s.items.length, 0);

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); } catch {}
}

function colorForPct(pct) {
  if (pct < 20) return '#ff4444';
  if (pct < 40) return '#ff8800';
  if (pct < 60) return '#ffcc00';
  if (pct < 80) return '#88ff44';
  return '#00ffcc';
}

function labelForPct(pct) {
  if (pct < 20) return 'RECON PHASE';
  if (pct < 40) return 'BUILDING FUNDAMENTALS';
  if (pct < 60) return 'FINDING LOWS & MEDS';
  if (pct < 80) return 'CRACKING HIGHS';
  return 'HITTING CRITICALS';
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const wrap = document.getElementById('sections-wrap');
  wrap.innerHTML = '';

  sections.forEach(section => {
    const isOpen = !!expanded[section.id];
    const sectionChecked = section.items.filter(i => checked[i.id]).length;
    const sectionPct = Math.round((sectionChecked / section.items.length) * 100);
    const countColor = sectionPct === 100 ? '#00ffcc' : sectionPct > 50 ? '#88ff44' : '#555';
    const miniBarColor = sectionPct === 100 ? '#00ffcc' : '#88ff44';

    const block = document.createElement('div');
    block.className = 'section-block';

    block.innerHTML = `
      <div class="section-header${isOpen ? ' open' : ''}" data-sid="${section.id}">
        <div class="section-header-left">
          <div class="section-label">${section.label}</div>
          ${isOpen ? `<div class="section-subtitle">${section.subtitle}</div>` : ''}
          <div class="section-mini-bar-track" style="display:${isOpen && sectionChecked > 0 ? 'block' : 'none'}">
            <div class="section-mini-bar-fill" style="width:${sectionPct}%; background:${miniBarColor};"></div>
          </div>
        </div>
        <div class="section-header-right">
          <span class="section-count" style="color:${countColor}">${sectionChecked}/${section.items.length}</span>
          <span class="section-arrow" style="transform:${isOpen ? 'rotate(90deg)' : 'rotate(0deg)'}">▶</span>
        </div>
      </div>
      <div class="section-items${isOpen ? ' open' : ''}">
        ${section.items.map((item) => `
          <div class="item-row${checked[item.id] ? ' checked' : ''}" data-iid="${item.id}">
            <div class="item-checkbox${checked[item.id] ? ' checked' : ''}">
              <span class="item-checkmark">✓</span>
            </div>
            <div class="item-text">${item.text}</div>
          </div>
        `).join('')}
      </div>
    `;
    wrap.appendChild(block);
  });

  // Section toggle
  wrap.querySelectorAll('.section-header').forEach(el => {
    el.addEventListener('click', () => {
      const sid = el.dataset.sid;
      expanded[sid] = !expanded[sid];
      render();
      updateProgress();
    });
  });

  // Item toggle
  wrap.querySelectorAll('.item-row').forEach(el => {
    el.addEventListener('click', () => {
      const iid = el.dataset.iid;
      checked[iid] = !checked[iid];
      save();
      render();
      updateProgress();
    });
  });
}

function updateProgress() {
  const totalChecked = Object.values(checked).filter(Boolean).length;
  const pct = Math.round((totalChecked / totalItems) * 100);
  const color = colorForPct(pct);
  const label = labelForPct(pct);

  document.getElementById('pct-display').textContent = pct + '%';
  document.getElementById('pct-display').style.color = color;
  document.getElementById('count-display').textContent = totalChecked + '/' + totalItems + ' CONFIRMED';
  document.getElementById('readiness-label').textContent = label;
  document.getElementById('readiness-label').style.color = color;

  const bar = document.getElementById('main-bar');
  bar.style.width = pct + '%';
  bar.style.background = color;
  bar.style.boxShadow = '0 0 8px ' + color + '44';
}

function resetAll() {
  if (!confirm('Reset all progress?')) return;
  checked = {};
  save();
  render();
  updateProgress();
}

// ── Init ───────────────────────────────────────────────────────────────────
render();
updateProgress();
</script>
